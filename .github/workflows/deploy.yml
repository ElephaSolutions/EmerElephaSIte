name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine project directory
        id: set-dir
        run: |
          if [ -f package.json ]; then echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f frontend/package.json ]; then echo "dir=frontend" >> $GITHUB_OUTPUT
          else echo "No package.json found in repo root or frontend/"; exit 1; fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ steps.set-dir.outputs.dir }}

      - name: Build
        run: npm run build --if-present
        working-directory: ${{ steps.set-dir.outputs.dir }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.set-dir.outputs.dir }}/build
          publish_branch: gh-pages
