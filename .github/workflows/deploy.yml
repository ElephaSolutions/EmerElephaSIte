name: Deploy Frontend to GitHub Pages (no JS actions)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository using git
        env:
          REPO: ${{ github.repository }}
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${REPO}.git .

      - name: Determine project directory
        id: set-dir
        run: |
          if [ -f package.json ]; then echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f frontend/package.json ]; then echo "dir=frontend" >> $GITHUB_OUTPUT
          else echo "No package.json found in repo root or frontend/"; exit 1; fi

      - name: Install Node.js 24 (NodeSource)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      - name: Install dependencies
        run: |
          set -e
          cd "${{ steps.set-dir.outputs.dir }}"
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Found lockfile — using npm ci (legacy-peer-deps)"
            npm ci --legacy-peer-deps
          else
            echo "No lockfile found — using npm install (legacy-peer-deps)"
            npm install --legacy-peer-deps
          fi

      - name: Build
        run: npm run build --if-present
        working-directory: ${{ steps.set-dir.outputs.dir }}

      - name: Deploy to gh-pages (plain git)
        env:
          REPO: ${{ github.repository }}
        run: |
          set -e
          build_dir="${{ steps.set-dir.outputs.dir }}/build"
          if [ ! -d "$build_dir" ]; then echo "Build directory not found: $build_dir"; exit 1; fi
          tmpdir=$(mktemp -d)
          cp -r "$build_dir"/. "$tmpdir"/
          cd "$tmpdir"
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${REPO}.git
          git checkout -b gh-pages
          git add --all
          git commit -m "Deploy to gh-pages: ${GITHUB_SHA}"
          git push -f origin gh-pages
